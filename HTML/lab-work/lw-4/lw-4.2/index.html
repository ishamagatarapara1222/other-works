<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Daily Schedule</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>📅 My Daily Schedule</h1>

    <!-- Morning -->
    <div class="card morning">
        <h2>🌅 Morning</h2>

        <ul>
            <li>Wake up at 6:30 AM</li>
            <li>Exercise</li>
            <li>Breakfast</li>
        </ul>
    </div>

    <!-- Afternoon -->
    <div class="card afternoon">
        <h2>🌞 Afternoon</h2>

        <ul>
            <li>Attend Classes</li>
            <li>Lunch Break</li>
            <li>Study</li>
        </ul>
    </div>

    <!-- Evening -->
    <div class="card evening">
        <h2>🌙 Evening</h2>

        <ul>
            <li>Dinner</li>
            <li>Homework</li>
            <li>Go to Bed at 10 PM</li>
        </ul>
    </div>

</div>

</body>
</html>
